name: Static App Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify Structure
      run: |
        test -f public/index.html || (echo "index.html missing" && exit 1)
        test -f public/app.js || (echo "app.js missing" && exit 1)
        echo "Structure verified successfully."

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Lint (Optional)
      run: echo "No linting configured yet"
