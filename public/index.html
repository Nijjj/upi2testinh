<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UPI Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <div id="debug-error" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; display: none; background: #fff;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('debug-error');
        el.style.display = 'block';
        el.innerHTML += 'Error: ' + msg + '\nAt: ' + url + ':' + line + ':' + col + '\n\n';
        return false;
      };
      window.onunhandledrejection = function(event) {
        var el = document.getElementById('debug-error');
        el.style.display = 'block';
        el.innerHTML += 'Promise Rejection: ' + event.reason + '\n\n';
      };
    </script>

    <!-- Lightweight React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Modules -->
    <script src="js/utils.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/components.js"></script>
    <script src="app.js"></script>
  </body>
</html>
